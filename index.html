<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poly Vocab</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #4A90D9;
      --blue-dark: #3a7bc8;
      --green: #4CAF50;
      --red: #E53935;
      --gray: #f5f5f5;
      --gray-mid: #e0e0e0;
      --gray-dark: #666;
      --text: #222;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ---- Screens ---- */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 24px 20px 32px;
      animation: fadeIn 0.25s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Header ---- */
    .app-header {
      background: var(--blue);
      color: #fff;
      padding: 18px 20px 14px;
      flex-shrink: 0;
    }
    .app-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .app-header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ---- Buttons ---- */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
      min-height: 52px;
      width: 100%;
      text-align: center;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 3px 10px rgba(74,144,217,0.35);
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled {
      background: var(--gray-mid);
      color: var(--gray-dark);
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-outline {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue);
    }
    .btn-outline:hover { background: #eef5fc; }

    .btn-ghost {
      background: var(--gray);
      color: var(--gray-dark);
      font-weight: 600;
    }
    .btn-ghost:hover { background: var(--gray-mid); }

    .btn-share {
      background: #f0f7ff;
      color: var(--blue);
      border: 2px solid var(--blue);
      font-weight: 700;
    }
    .btn-share:hover { background: #dbeeff; }

    .btn-mode {
      background: #fff;
      color: var(--text);
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      padding: 18px 16px;
      font-size: 17px;
      font-weight: 700;
      flex-direction: column;
      gap: 6px;
      box-shadow: var(--shadow);
    }
    .btn-mode .mode-icon { font-size: 30px; }
    .btn-mode:hover { border-color: var(--blue); color: var(--blue); }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ================ SCREEN 1: INPUT (NEW PHOTO-FIRST) ================ */

    /* Camera button */
    .camera-btn-wrap {
      margin-bottom: 16px;
    }
    #camera-input {
      display: none;
    }
    .camera-btn-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #4A90D9 0%, #3a7bc8 100%);
      color: #fff;
      border-radius: 20px;
      padding: 32px 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(74,144,217,0.40);
      transition: transform 0.12s, box-shadow 0.12s;
      text-align: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .camera-btn-label:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(74,144,217,0.30); }
    .camera-btn-icon { font-size: 52px; line-height: 1; }
    .camera-btn-text { font-size: 20px; font-weight: 800; }
    .camera-btn-sub { font-size: 14px; opacity: 0.85; font-weight: 500; }

    /* Gallery link */
    .gallery-link-row {
      text-align: center;
      margin-bottom: 20px;
    }
    #gallery-input { display: none; }
    .gallery-link {
      font-size: 14px;
      color: var(--gray-dark);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
      padding: 4px;
    }
    .gallery-link:hover { color: var(--blue); }

    /* Loading state */
    #ai-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 0;
      text-align: center;
    }
    #ai-loading.active { display: flex; }
    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid var(--gray-mid);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--gray-dark);
    }
    .loading-sub {
      font-size: 13px;
      color: var(--gray-mid);
    }

    /* Preview list */
    #preview-section {
      display: none;
    }
    #preview-section.active { display: block; }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .preview-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .preview-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      background: #eef5fc;
      padding: 4px 12px;
      border-radius: 99px;
    }
    .preview-list {
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      max-height: 280px;
      overflow-y: auto;
    }
    .preview-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--gray-mid);
      gap: 10px;
      background: #fff;
    }
    .preview-item:last-child { border-bottom: none; }
    .preview-item-content { flex: 1; min-width: 0; }
    .preview-word {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .preview-def {
      font-size: 13px;
      color: var(--gray-dark);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-remove-btn {
      background: none;
      border: none;
      color: var(--gray-mid);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .preview-remove-btn:hover { color: var(--red); background: #ffebee; }

    /* Error box */
    .error-box {
      background: #ffebee;
      border: 1.5px solid #ef9a9a;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #c62828;
      font-weight: 600;
      display: none;
    }
    .error-box.active { display: block; }

    /* Manual input fallback */
    .manual-toggle {
      text-align: center;
      margin-top: 8px;
    }
    #manual-toggle-btn {
      background: none;
      border: none;
      color: var(--gray-dark);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      padding: 4px;
      font-family: inherit;
    }
    #manual-toggle-btn:hover { color: var(--blue); }

    .manual-input-section {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1.5px solid var(--gray-mid);
    }
    .manual-input-section.active { display: block; }
    .manual-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-dark);
      margin-bottom: 10px;
    }
    #input-area {
      width: 100%;
      min-height: 160px;
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    #input-area:focus { border-color: var(--blue); }
    #input-area.valid { border-color: var(--green); }
    .input-status {
      font-size: 13px;
      color: var(--gray-dark);
      margin-bottom: 16px;
      min-height: 18px;
    }
    .input-status.ok { color: var(--green); font-weight: 600; }
    .input-status.err { color: var(--red); }

    /* Load saved */
    .divider {
      text-align: center;
      color: var(--gray-dark);
      font-size: 13px;
      margin: 16px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--gray-mid);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    /* ================ SCREEN: DAY SELECT ================ */
    #screen-days .days-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    #screen-days .days-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }
    #screen-days .days-summary {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      background: #eef5fc;
      padding: 5px 14px;
      border-radius: 99px;
    }

    .days-select-all-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: var(--gray);
      border-radius: var(--radius);
    }
    .days-select-all-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .days-toggle-btn {
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
    }
    .days-toggle-btn:hover { background: #eef5fc; }

    .days-list {
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      flex: 1;
      overflow-y: auto;
      max-height: 340px;
    }

    .day-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-mid);
      gap: 12px;
      background: #fff;
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .day-item:last-child { border-bottom: none; }
    .day-item:active { background: #f8f9fa; }

    /* Custom checkbox */
    .day-checkbox {
      width: 26px;
      height: 26px;
      border: 2.5px solid var(--gray-mid);
      border-radius: 7px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .day-checkbox.checked {
      border-color: var(--blue);
      background: var(--blue);
    }
    .day-checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
    }

    .day-info {
      flex: 1;
      min-width: 0;
    }
    .day-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
    }
    .day-count {
      font-size: 13px;
      color: var(--gray-dark);
      font-weight: 600;
      margin-top: 1px;
    }

    .day-delete-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      line-height: 1;
      transition: background 0.12s;
      flex-shrink: 0;
      color: var(--gray-dark);
    }
    .day-delete-btn:hover { background: #ffebee; color: var(--red); }

    .days-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-dark);
      font-size: 15px;
    }

    .days-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    /* ================ SCREEN 2: MODE SELECT ================ */
    #screen-mode .word-count {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 24px;
      padding: 16px;
      background: #eef5fc;
      border-radius: var(--radius);
    }

    .mode-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    /* ================ SHARED QUIZ/CARD STYLES ================ */
    .quiz-header {
      margin-bottom: 16px;
    }

    .progress-bar-wrap {
      background: var(--gray-mid);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 13px;
      color: var(--gray-dark);
      text-align: right;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--gray-dark);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
    }
    .back-btn:hover { color: var(--blue); }

    /* ================ SCREEN 3a: FLASHCARD ================ */
    .card-scene {
      perspective: 900px;
      margin: 0 auto 24px;
      width: 100%;
      max-width: 360px;
      height: 220px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
    }
    .card-front {
      background: #fff;
      border: 2px solid var(--blue);
    }
    .card-back {
      background: var(--blue);
      color: #fff;
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 10px;
    }
    .card-front .card-label { color: var(--blue); }
    .card-definition {
      font-size: 19px;
      line-height: 1.5;
      font-weight: 600;
      color: var(--text);
    }
    .card-word {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -1px;
    }
    .card-tap-hint {
      font-size: 12px;
      color: var(--gray-dark);
      margin-top: 8px;
    }
    .card-front .card-tap-hint { color: var(--blue); opacity: 0.5; }

    .card-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-controls .btn { flex: 1; }
    .card-progress {
      text-align: center;
      font-size: 14px;
      color: var(--gray-dark);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .shuffle-btn {
      background: none;
      border: none;
      font-size: 14px;
      color: var(--gray-dark);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
    }
    .shuffle-btn:hover { background: var(--gray); color: var(--blue); }

    /* ================ SCREEN 3b/3c: QUIZ ================ */
    .quiz-definition {
      background: var(--gray);
      border-radius: var(--radius);
      padding: 18px;
      font-size: 19px;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 20px;
      border-left: 4px solid var(--blue);
    }

    .choices-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .choice-btn {
      background: #fff;
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      min-height: 52px;
      text-align: left;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--blue);
      background: #eef5fc;
    }
    .choice-btn.correct {
      border-color: var(--green);
      background: #e8f5e9;
      color: #2e7d32;
    }
    .choice-btn.wrong {
      border-color: var(--red);
      background: #ffebee;
      color: #c62828;
    }
    .choice-btn:disabled { cursor: default; }

    /* Fill in blank */
    .fill-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    #fill-input {
      flex: 1;
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 700;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #fill-input:focus { border-color: var(--blue); }
    #fill-input.correct { border-color: var(--green); background: #e8f5e9; }
    #fill-input.wrong { border-color: var(--red); background: #ffebee; }

    .fill-feedback {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      min-height: 28px;
      margin-bottom: 12px;
    }
    .fill-feedback.correct { color: var(--green); }
    .fill-feedback.wrong { color: var(--red); }

    /* ================ SCORE SCREEN ================ */
    .score-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 32px 0;
    }
    .score-emoji { font-size: 72px; }
    .score-title { font-size: 26px; font-weight: 900; }
    .score-sub { font-size: 18px; color: var(--gray-dark); }
    .score-detail { font-size: 15px; color: var(--gray-dark); margin-top: -8px; }
    .score-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">

  <div class="app-header">
    <h1>📚 Poly Vocab</h1>
    <p>폴리 영어학원 단어 플래시카드 &amp; 퀴즈</p>
  </div>

  <!-- ===== SCREEN 1: INPUT (PHOTO-FIRST) ===== -->
  <div class="screen active" id="screen-input">

    <!-- Camera button (primary action) -->
    <div class="camera-btn-wrap">
      <input type="file" id="camera-input" accept="image/*" capture="environment">
      <label for="camera-input" class="camera-btn-label">
        <span class="camera-btn-icon">📷</span>
        <span class="camera-btn-text">사진으로 단어 추가</span>
        <span class="camera-btn-sub">카메라로 시험지를 찍으세요</span>
      </label>
    </div>

    <!-- Gallery / file upload fallback -->
    <div class="gallery-link-row">
      <input type="file" id="gallery-input" accept="image/*">
      <label for="gallery-input" class="gallery-link">또는 갤러리에서 사진 선택</label>
    </div>

    <!-- Error box -->
    <div class="error-box" id="error-box"></div>

    <!-- Loading state -->
    <div id="ai-loading">
      <div class="spinner"></div>
      <div class="loading-text">AI가 단어를 인식하고 있어요...</div>
      <div class="loading-sub">잠시만 기다려주세요</div>
    </div>

    <!-- Preview section -->
    <div id="preview-section">
      <div class="preview-header">
        <span class="preview-title">인식된 단어 목록</span>
        <span class="preview-count" id="preview-count">0개</span>
      </div>
      <div class="preview-list" id="preview-list"></div>
      <button class="btn btn-primary" id="preview-confirm-btn">반영하기 — 공부 시작!</button>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const PROMPT_TEXT = `이 사진은 영어 단어 시험지입니다.
각 단어와 Definition을 추출해주세요.

아래 형식으로만 출력하세요. 다른 설명 없이 코드만 출력:

POLYVOCAB_V1
WORD:단어|definition 원문 그대로
...
END

규칙:
- definition은 시험지에 적힌 영어 원문 그대로 사용
- 한 줄에 단어 하나씩
- WORD: 접두어 반드시 포함`;

const LS_KEY_LEGACY = 'poly-vocab:v1:data';
const LS_KEY_DAYS   = 'poly-vocab:v2:days';
const GEMINI_API_KEY = 'AIzaSyDG6Iy6W0R3uc0g7CCYn0b7j8Gtuv5HPaw';
const GEMINI_ENDPOINT = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';
const MAX_IMAGE_PX = 1024;

// ============================================================
//  STATE
// ============================================================
let words = [];           // [{word, definition}] — active study set
let days  = [];           // [{day: N, words: [{word, definition}]}]
let selectedDayNums = []; // day numbers currently selected for study
let previewWords = [];    // pending confirmed words from AI
let flashOrder = [];
let flashIdx = 0;
let flashFlipped = false;

let mcQueue = [];
let mcIdx = 0;
let mcWrong = [];
let mcAnswered = false;

let fillQueue = [];
let fillIdx = 0;
let fillWrong = [];
let fillAnswered = false;

// ============================================================
//  HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function toast(msg, dur = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
//  DAYS STORAGE
// ============================================================
function loadDays() {
  try {
    const raw = localStorage.getItem(LS_KEY_DAYS);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) return parsed;
    }
  } catch(e) {}
  return [];
}

function saveDays(daysArr) {
  localStorage.setItem(LS_KEY_DAYS, JSON.stringify(daysArr));
}

function nextDayNumber() {
  if (days.length === 0) return 1;
  return Math.max(...days.map(d => d.day)) + 1;
}

function addNewDay(wordList) {
  const dayNum = nextDayNumber();
  days.push({ day: dayNum, words: [...wordList] });
  saveDays(days);
  return dayNum;
}

function deleteDay(dayNum) {
  days = days.filter(d => d.day !== dayNum);
  saveDays(days);
}

// ============================================================
//  MIGRATION: v1 → v2
// ============================================================
function migrateV1() {
  try {
    const legacy = localStorage.getItem(LS_KEY_LEGACY);
    if (!legacy) return;
    const parsed = JSON.parse(legacy);
    if (Array.isArray(parsed) && parsed.length > 0) {
      // Only migrate if v2 doesn't exist yet
      const existing = localStorage.getItem(LS_KEY_DAYS);
      if (!existing) {
        saveDays([{ day: 1, words: parsed }]);
      }
      localStorage.removeItem(LS_KEY_LEGACY);
    }
  } catch(e) {}
}

// ============================================================
//  PARSER
// ============================================================
function parsePolyvocab(raw) {
  // Strip markdown code blocks if present (```...```)
  const cleaned = raw.replace(/```[\w]*\n?/g, '');
  const lines = cleaned.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const startIdx = lines.findIndex(l => l === 'POLYVOCAB_V1');
  if (startIdx === -1) return null;

  const result = [];
  for (let i = startIdx + 1; i < lines.length; i++) {
    const line = lines[i];
    if (line === 'END') break;
    if (!line.startsWith('WORD:')) continue;
    const content = line.slice(5);
    const sepIdx = content.indexOf('|');
    if (sepIdx === -1) continue;
    const word = content.slice(0, sepIdx).trim();
    const definition = content.slice(sepIdx + 1).trim();
    if (!word || !definition) continue;
    result.push({ word, definition });
  }
  return result.length > 0 ? result : null;
}

function generateChoices(wordObj, allWords) {
  const others = allWords.filter(w => w.word !== wordObj.word);
  const picked = shuffle(others).slice(0, 4).map(w => w.word);
  picked.push(wordObj.word);
  return shuffle(picked);
}

// ============================================================
//  IMAGE RESIZE (canvas, client-side)
// ============================================================
function resizeImageToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_IMAGE_PX || height > MAX_IMAGE_PX) {
          const ratio = Math.min(MAX_IMAGE_PX / width, MAX_IMAGE_PX / height);
          width  = Math.round(width  * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // Always output as jpeg for smaller size
        const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
        const base64 = dataUrl.split(',')[1];
        resolve(base64);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
//  GEMINI VISION API
// ============================================================
async function callGeminiVision(base64Image) {
  const response = await fetch(
    `${GEMINI_ENDPOINT}?key=${encodeURIComponent(GEMINI_API_KEY)}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: PROMPT_TEXT },
            { inlineData: { mimeType: 'image/jpeg', data: base64Image } }
          ]
        }]
      })
    }
  );

  if (!response.ok) {
    let errMsg = `API 오류 (${response.status})`;
    try {
      const errData = await response.json();
      const detail = errData?.error?.message || '';
      if (response.status === 429) errMsg = '요청이 너무 많습니다. 잠시 후 다시 시도해주세요.';
      else if (detail) errMsg = detail;
    } catch(_) {}
    throw new Error(errMsg);
  }

  const data = await response.json();
  // Gemini 2.5 may return thinking parts — find the last text part (skip thought parts)
  const parts = data?.candidates?.[0]?.content?.parts || [];
  let text = '';
  for (const p of parts) {
    if (p.text && !p.thought) text = p.text;
  }
  if (!text) throw new Error('AI 응답이 비어있습니다. 다시 시도해주세요.');
  return text;
}

// ============================================================
//  PHOTO PROCESSING FLOW
// ============================================================
function setLoadingState(active) {
  if (active) {
    $('ai-loading').classList.add('active');
    $('preview-section').classList.remove('active');
    $('error-box').classList.remove('active');
    $('camera-btn-wrap').style.opacity = '0.4';
    $('camera-btn-wrap').style.pointerEvents = 'none';
    $('gallery-link-row').style.opacity = '0.4';
    $('gallery-link-row').style.pointerEvents = 'none';
    $('manual-toggle').style.display = 'none';
  } else {
    $('ai-loading').classList.remove('active');
    $('camera-btn-wrap').style.opacity = '';
    $('camera-btn-wrap').style.pointerEvents = '';
    $('gallery-link-row').style.opacity = '';
    $('gallery-link-row').style.pointerEvents = '';
    $('manual-toggle').style.display = '';
  }
}

function showError(msg) {
  const box = $('error-box');
  box.textContent = msg;
  box.classList.add('active');
  setLoadingState(false);
}

function renderPreview(wordList) {
  previewWords = [...wordList];
  $('preview-count').textContent = `${previewWords.length}개`;

  const list = $('preview-list');
  list.innerHTML = '';
  previewWords.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `
      <div class="preview-item-content">
        <div class="preview-word">${escapeHtml(item.word)}</div>
        <div class="preview-def">${escapeHtml(item.definition)}</div>
      </div>
      <button class="preview-remove-btn" data-idx="${idx}" title="삭제">✕</button>
    `;
    list.appendChild(div);
  });

  // Attach remove handlers
  list.querySelectorAll('.preview-remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.idx, 10);
      previewWords.splice(i, 1);
      renderPreview(previewWords);
    });
  });

  $('preview-section').classList.add('active');
  setLoadingState(false);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function processImageFile(file) {
  if (!file) return;

  $('error-box').classList.remove('active');
  setLoadingState(true);

  try {
    const base64 = await resizeImageToBase64(file);
    const rawText = await callGeminiVision(base64);
    const parsed  = parsePolyvocab(rawText);

    if (!parsed || parsed.length === 0) {
      showError('⚠️ 단어를 인식하지 못했습니다. 시험지가 잘 보이는 사진으로 다시 시도해주세요.');
      return;
    }

    // Accumulate: merge new words into existing preview (skip duplicates)
    const existing = new Set(previewWords.map(w => w.word.toLowerCase()));
    const newWords = parsed.filter(w => !existing.has(w.word.toLowerCase()));
    previewWords = [...previewWords, ...newWords];
    renderPreview(previewWords);
    toast(`${newWords.length}개 단어 추가 (총 ${previewWords.length}개)`);
  } catch (err) {
    showError('❌ ' + (err.message || '알 수 없는 오류가 발생했습니다.'));
  }
}

//  MANUAL INPUT FALLBACK
// ============================================================
let manualOpen = false;
$('manual-toggle-btn').addEventListener('click', () => {
  manualOpen = !manualOpen;
  $('manual-input-section').classList.toggle('active', manualOpen);

function validateInput() {

}

function wordsToHash(wordsArr) {
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(wordsArr))));
  } catch(e) { return null; }
}

function hashToWords(hash) {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch(e) { return null; }
}

function getShareURL() {
  const base = location.href.split('#')[0];
  return base + '#v=' + wordsToHash(words);
}

function renderDayList() {
  const list = $('days-list');
  list.innerHTML = '';

  if (days.length === 0) {
    list.innerHTML = '<div class="days-empty">저장된 Day가 없습니다.<br>단어를 추가해보세요!</div>';
    $('days-summary').textContent = '0개 단어';
    updateSelectAllCheckbox();
    return;
  }

  // Default: all days selected if selectedDayNums is empty or has stale data
  const validDayNums = days.map(d => d.day);
  selectedDayNums = selectedDayNums.filter(n => validDayNums.includes(n));
  if (selectedDayNums.length === 0) {
    selectedDayNums = [...validDayNums];
  }

  days.forEach(dayObj => {
    const isChecked = selectedDayNums.includes(dayObj.day);
    const row = document.createElement('div');
    row.className = 'day-item';
    row.dataset.day = dayObj.day;
    row.innerHTML = `
      <div class="day-checkbox${isChecked ? ' checked' : ''}" data-day="${dayObj.day}"></div>
      <div class="day-info">
        <div class="day-name">Day ${dayObj.day}</div>
        <div class="day-count">${dayObj.words.length}개 단어</div>
      </div>
      <button class="day-delete-btn" data-day="${dayObj.day}" title="삭제">🗑</button>
    `;

    // Row click toggles checkbox (but not when clicking delete)
    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('day-delete-btn')) return;
      toggleDaySelection(dayObj.day);
    });

    // Delete button
    row.querySelector('.day-delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Day ${dayObj.day}을 삭제할까요? (${dayObj.words.length}개 단어)`)) {
        deleteDay(dayObj.day);
        selectedDayNums = selectedDayNums.filter(n => n !== dayObj.day);
        days = loadDays();
        renderDayList();
        toast(`Day ${dayObj.day} 삭제됨`);
      }
    });

    list.appendChild(row);
  });

  updateSummary();
  updateSelectAllCheckbox();
}

function toggleDaySelection(dayNum) {
  if (selectedDayNums.includes(dayNum)) {
    selectedDayNums = selectedDayNums.filter(n => n !== dayNum);
  } else {
    selectedDayNums.push(dayNum);
  }
  // Update checkbox in DOM
  const checkbox = document.querySelector(`.day-checkbox[data-day="${dayNum}"]`);
  if (checkbox) checkbox.classList.toggle('checked', selectedDayNums.includes(dayNum));
  updateSummary();
  updateSelectAllCheckbox();
}

function updateSummary() {
  const totalWords = days
    .filter(d => selectedDayNums.includes(d.day))
    .reduce((sum, d) => sum + d.words.length, 0);
  $('days-summary').textContent = `선택됨: ${totalWords}개 단어`;
}

function updateSelectAllCheckbox() {
  const allNums = days.map(d => d.day);
  const allSelected = allNums.length > 0 && allNums.every(n => selectedDayNums.includes(n));
  const cb = $('select-all-checkbox');
  cb.classList.toggle('checked', allSelected);
}

$('days-toggle-btn').addEventListener('click', () => {
  const allNums = days.map(d => d.day);
  const allSelected = allNums.every(n => selectedDayNums.includes(n));
  if (allSelected) {
    selectedDayNums = [];
  } else {
    selectedDayNums = [...allNums];
  }
  renderDayList();
});

$('select-all-checkbox').addEventListener('click', (e) => {
  e.stopPropagation();
  const allNums = days.map(d => d.day);
  const allSelected = allNums.every(n => selectedDayNums.includes(n));
  if (allSelected) {
    selectedDayNums = [];
  } else {
    selectedDayNums = [...allNums];
  }
  renderDayList();
});

$('days-study-btn').addEventListener('click', () => {
  if (selectedDayNums.length === 0) { toast('공부할 Day를 선택해주세요'); return; }
  // Merge selected days into words
  words = [];
  days.filter(d => selectedDayNums.includes(d.day)).forEach(d => {
    words = [...words, ...d.words];
  });
  if (words.length === 0) { toast('선택한 Day에 단어가 없습니다'); return; }
  goModeSelect();
});

$('days-add-btn').addEventListener('click', () => {
  // Go to input screen, reset state
  inputArea.value = '';
  validateInput();
  $('preview-section').classList.remove('active');
  $('error-box').classList.remove('active');
  previewWords = [];
  setLoadingState(false);
  showScreen('screen-input');
});

// ============================================================
//  SCREEN 2 – MODE SELECT
// ============================================================
function goModeSelect() {
  const dayNums = selectedDayNums.slice().sort((a, b) => a - b);
  const dayLabel = dayNums.length > 0 ? `Day ${dayNums.join(', ')} 공부중` : '';
  $('word-count-label').textContent = `🎉 ${dayLabel} (${words.length}개)`;
  showScreen('screen-mode');
}

$('back-to-days-btn').addEventListener('click', goDaySelect);

$('mode-flash').addEventListener('click', startFlash);
$('mode-mc').addEventListener('click', () => startMC(words));
$('mode-fill').addEventListener('click', () => startFill(words));

// ============================================================
//  SCREEN 3a – FLASHCARD
// ============================================================
function startFlash() {
  flashOrder = words.map((_, i) => i);
  flashIdx = 0;
  flashFlipped = false;
  renderFlash();
  showScreen('screen-flash');
}

function renderFlash() {
  const w = words[flashOrder[flashIdx]];
  $('card-def').textContent = w.definition;
  $('card-word').textContent = w.word;
  $('flash-progress').textContent = `${flashIdx + 1} / ${words.length}`;
  flashFlipped = false;
  $('card-inner').classList.remove('flipped');
}

$('card-scene').addEventListener('click', () => {
  flashFlipped = !flashFlipped;
  $('card-inner').classList.toggle('flipped', flashFlipped);
});

$('flash-prev').addEventListener('click', () => {
  if (flashIdx > 0) { flashIdx--; renderFlash(); }
});
$('flash-next').addEventListener('click', () => {
  if (flashIdx < flashOrder.length - 1) { flashIdx++; renderFlash(); }
  else { toast('마지막 카드입니다! 🎉'); }
});
$('flash-shuffle').addEventListener('click', () => {
  flashOrder = shuffle(flashOrder);
  flashIdx = 0;
  renderFlash();
  toast('🔀 섞었습니다!');
});
$('flash-back').addEventListener('click', goModeSelect);

// ============================================================
//  SCREEN 3b – MULTIPLE CHOICE
// ============================================================
function startMC(queue) {
  mcQueue = shuffle([...queue]);
  mcIdx = 0;
  mcWrong = [];
  renderMC();
  showScreen('screen-mc');
}

function renderMC() {
  const old = $('mc-score');
  if (old) old.remove();

  const q = mcQueue[mcIdx];
  const total = mcQueue.length;
  const pct = (mcIdx / total) * 100;

  $('mc-bar').style.width = pct + '%';
  $('mc-progress').textContent = `${mcIdx} / ${total}`;
  $('mc-def').textContent = q.definition;
  mcAnswered = false;

  const grid = $('mc-choices');
  grid.innerHTML = '';

  const choices = generateChoices(q, words);
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.addEventListener('click', () => handleMCAnswer(choice, q.word, btn));
    grid.appendChild(btn);
  });
}

function handleMCAnswer(choice, answer, btn) {
  if (mcAnswered) return;
  mcAnswered = true;

  const isCorrect = choice.toLowerCase() === answer.toLowerCase();
  const allBtns = $('mc-choices').querySelectorAll('.choice-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent.toLowerCase() === answer.toLowerCase()) b.classList.add('correct');
  });

  if (!isCorrect) {
    btn.classList.add('wrong');
    mcWrong.push(mcQueue[mcIdx]);
  }

  const delay = isCorrect ? 800 : 1500;
  setTimeout(() => {
    mcIdx++;
    if (mcIdx < mcQueue.length) {
      renderMC();
    } else {
      showMCScore();
    }
  }, delay);
}

function showMCScore() {
  const total = mcQueue.length;
  const correct = total - mcWrong.length;
  const pct = Math.round((correct / total) * 100);

  $('mc-bar').style.width = '100%';
  $('mc-progress').textContent = `${total} / ${total}`;
  $('mc-def').textContent = '';
  $('mc-choices').innerHTML = '';

  const div = document.createElement('div');
  div.id = 'mc-score';
  div.className = 'score-screen';
  div.innerHTML = `
    <div class="score-emoji">${scoreEmoji(pct)}</div>
    <div class="score-title">${pct}점!</div>
    <div class="score-sub">${correct} / ${total} 정답</div>
    <div class="score-actions">
      ${mcWrong.length > 0 ? `<button class="btn btn-primary" id="mc-retry">틀린 단어 다시 풀기 (${mcWrong.length}개)</button>` : ''}
      <button class="btn btn-outline" id="mc-restart">처음부터 다시</button>
      <button class="btn btn-ghost" id="mc-home">모드 선택으로</button>
    </div>`;
  $('screen-mc').appendChild(div);

  if (mcWrong.length > 0) {
    $('mc-retry').addEventListener('click', () => startMC(mcWrong));
  }
  $('mc-restart').addEventListener('click', () => startMC(words));
  $('mc-home').addEventListener('click', goModeSelect);
}

$('mc-back').addEventListener('click', goModeSelect);

// ============================================================
//  SCREEN 3c – FILL IN BLANK
// ============================================================
function startFill(queue) {
  fillQueue = shuffle([...queue]);
  fillIdx = 0;
  fillWrong = [];
  renderFill();
  showScreen('screen-fill');
  setTimeout(() => $('fill-input').focus(), 150);
}

function renderFill() {
  const old = $('fill-score');
  if (old) old.remove();

  const q = fillQueue[fillIdx];
  const total = fillQueue.length;
  const pct = (fillIdx / total) * 100;

  $('fill-bar').style.width = pct + '%';
  $('fill-progress').textContent = `${fillIdx} / ${total}`;
  $('fill-def').textContent = q.definition;
  $('fill-feedback').textContent = '';
  $('fill-feedback').className = 'fill-feedback';

  const inp = $('fill-input');
  inp.value = '';
  inp.className = '';
  inp.disabled = false;
  $('fill-submit').disabled = false;
  fillAnswered = false;

  setTimeout(() => inp.focus(), 100);
}

function handleFillAnswer() {
  if (fillAnswered) {
    fillIdx++;
    if (fillIdx < fillQueue.length) { renderFill(); }
    else { showFillScore(); }
    return;
  }

  const inp = $('fill-input');
  const userVal = inp.value.trim();
  if (!userVal) return;

  fillAnswered = true;
  inp.disabled = true;
  $('fill-submit').disabled = true;

  const q = fillQueue[fillIdx];
  const isCorrect = userVal.toLowerCase() === q.word.toLowerCase();

  if (isCorrect) {
    inp.classList.add('correct');
    $('fill-feedback').textContent = '정답! ✅';
    $('fill-feedback').className = 'fill-feedback correct';
  } else {
    inp.classList.add('wrong');
    $('fill-feedback').textContent = `오답! 정답: ${q.word}`;
    $('fill-feedback').className = 'fill-feedback wrong';
    fillWrong.push(q);
  }

  $('fill-submit').textContent = '다음 →';
  $('fill-submit').disabled = false;
}

$('fill-submit').addEventListener('click', handleFillAnswer);
$('fill-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleFillAnswer();
});

function showFillScore() {
  const total = fillQueue.length;
  const correct = total - fillWrong.length;
  const pct = Math.round((correct / total) * 100);

  $('fill-bar').style.width = '100%';
  $('fill-progress').textContent = `${total} / ${total}`;
  $('fill-def').textContent = '';
  $('fill-input').style.display = 'none';
  document.querySelector('.fill-input-wrap').style.display = 'none';
  $('fill-feedback').textContent = '';

  const div = document.createElement('div');
  div.id = 'fill-score';
  div.className = 'score-screen';
  div.innerHTML = `
    <div class="score-emoji">${scoreEmoji(pct)}</div>
    <div class="score-title">${pct}점!</div>
    <div class="score-sub">${correct} / ${total} 정답</div>
    <div class="score-actions">
      ${fillWrong.length > 0 ? `<button class="btn btn-primary" id="fill-retry">틀린 단어 다시 풀기 (${fillWrong.length}개)</button>` : ''}
      <button class="btn btn-outline" id="fill-restart">처음부터 다시</button>
      <button class="btn btn-ghost" id="fill-home">모드 선택으로</button>
    </div>`;
  $('screen-fill').appendChild(div);

  if (fillWrong.length > 0) {
    $('fill-retry').addEventListener('click', () => {
      document.querySelector('.fill-input-wrap').style.display = '';
      $('fill-input').style.display = '';
      $('fill-submit').textContent = '확인';
      startFill(fillWrong);
    });
  }
  $('fill-restart').addEventListener('click', () => {
    document.querySelector('.fill-input-wrap').style.display = '';
    $('fill-input').style.display = '';
    $('fill-submit').textContent = '확인';
    startFill(words);
  });
  $('fill-home').addEventListener('click', goModeSelect);
}

$('fill-back').addEventListener('click', () => {
  document.querySelector('.fill-input-wrap').style.display = '';
  $('fill-input').style.display = '';
  $('fill-submit').textContent = '확인';
  goModeSelect();
});

// ============================================================
//  UTILITIES
// ============================================================
function scoreEmoji(pct) {
  if (pct === 100) return '🎉';
  if (pct >= 80)  return '👍';
  if (pct >= 60)  return '💪';
  return '📚';
}

// ============================================================
//  INIT
// ============================================================
(function init() {
  // 1. Migrate v1 data to v2 if needed
  migrateV1();

  // 2. Check URL hash — temporary study session, no day assignment
  const hash = location.hash;
  if (hash.startsWith('#v=')) {
    const encoded = hash.slice(3);
    const parsed = hashToWords(encoded);
    if (parsed && Array.isArray(parsed) && parsed.length > 0) {
      words = parsed;
      history.replaceState(null, '', location.pathname);
      // Go directly to mode select (no day assignment for shared links)
      selectedDayNums = [];
      $('word-count-label').textContent = `🎉 공유된 단어 (${words.length}개)`;
      showScreen('screen-mode');
      return;
    }
  }

  // 3. Load days from storage
  days = loadDays();

  // 4. If days exist, go to day select; otherwise show input
  if (days.length > 0) {
    selectedDayNums = [];
    goDaySelect();
  }
  // else: default screen-input is already active
})();
</script>
</body>
</html>
